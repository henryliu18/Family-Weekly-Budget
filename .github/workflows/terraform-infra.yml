name: Terraform Infra

on:
  pull_request:
    branches: [main]
    paths: ['infra/**']
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

env:
  TF_VAR_region: ap-sydney-1
  TF_VAR_availability_domain: AD-1
  TF_VAR_instance_shape: VM.Standard.E2.1.Micro

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      plan_has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Write OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Generate backend.hcl with auth
        run: |
          cat > infra/backend.hcl << 'EOF'
          bucket               = "family-budget-tfstate"
          namespace            = "sd4qtykmlhzs"
          region               = "ap-sydney-1"
          key                  = "infra/terraform.tfstate"
          workspace_key_prefix = "tf-state-env"
          tenancy_ocid         = "${{ secrets.OCI_TENANCY_OCID }}"
          user_ocid            = "${{ secrets.OCI_USER_OCID }}"
          fingerprint          = "${{ secrets.OCI_FINGERPRINT }}"
          private_key_path     = "~/.oci/oci_api_key.pem"
          EOF

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Plan
        id: plan
        working-directory: infra
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "has_changes=$(grep -c 'Plan:.*to add' plan.txt || true)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_compartment_ocid: ${{ secrets.TF_VAR_COMPARTMENT_OCID }}
          TF_VAR_image_ocid: ${{ secrets.TF_VAR_IMAGE_OCID }}
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 1

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number || context.payload.pull_request?.number;
            if (!prNumber) {
              core.warning('No PR number found — skipping comment');
              return;
            }
            const planPath = `${process.env.GITHUB_WORKSPACE}/infra/plan.txt`;
            if (!fs.existsSync(planPath)) {
              core.warning('plan.txt not found — skipping comment');
              return;
            }
            const plan = fs.readFileSync(planPath, 'utf8');
            const snippet = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Terraform Plan\n```\n' + snippet + '\n```'
            });

  apply:
    name: Apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Write OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra/

      - name: Generate backend.hcl with auth
        run: |
          cat > infra/backend.hcl << 'EOF'
          bucket               = "family-budget-tfstate"
          namespace            = "sd4qtykmlhzs"
          region               = "ap-sydney-1"
          key                  = "infra/terraform.tfstate"
          workspace_key_prefix = "tf-state-env"
          tenancy_ocid         = "${{ secrets.OCI_TENANCY_OCID }}"
          user_ocid            = "${{ secrets.OCI_USER_OCID }}"
          fingerprint          = "${{ secrets.OCI_FINGERPRINT }}"
          private_key_path     = "~/.oci/oci_api_key.pem"
          EOF

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=backend.hcl -reconfigure

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_api_key_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_compartment_ocid: ${{ secrets.TF_VAR_COMPARTMENT_OCID }}
          TF_VAR_image_ocid: ${{ secrets.TF_VAR_IMAGE_OCID }}
          TF_VAR_ssh_public_key: ${{ secrets.VM_SSH_PUBLIC_KEY }}
