name: Deploy To VM

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          ssh -tt -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" /bin/bash <<EOF
          set -euxo pipefail
          whoami
          pwd
          ls -la "${{ vars.VM_APP_PATH }}"
          command -v docker
          sudo docker --version
          sudo docker compose version
          cd "${{ vars.VM_APP_PATH }}"
          sudo docker compose -p family-budget down
          # sudo docker compose pull
          sudo docker compose -p family-budget up -d
          EOF
