name: Deploy To VM

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Write SSL cert files from secrets
        env:
          CERT: ${{ secrets.APP_SSL_CERT }}
          KEY: ${{ secrets.APP_SSL_KEY }}
        run: |
          mkdir -p /tmp/certs
          echo "$CERT" > /tmp/certs/server.crt
          echo "$KEY" > /tmp/certs/server.key
          chmod 644 /tmp/certs/server.crt
          chmod 600 /tmp/certs/server.key

      - name: Sync files to VM
        run: |
          ssh -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" \
            "mkdir -p '${{ vars.VM_APP_PATH }}'/certs"
          scp -o BatchMode=yes /tmp/certs/server.crt /tmp/certs/server.key \
            "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}:${{ vars.VM_APP_PATH }}/certs/"
          scp -o BatchMode=yes deploy/docker-compose.prod.yml \
            "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}:${{ vars.VM_APP_PATH }}/docker-compose.yml"

      - name: Deploy with Docker Compose
        env:
          APP_PASSWORD_SECRET: ${{ secrets.APP_PASSWORD }}
        run: |
          APP_PASSWORD_B64="$(printf '%s' "$APP_PASSWORD_SECRET" | base64 -w0)"
          ssh -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" "APP_PASSWORD_B64=$APP_PASSWORD_B64 bash -seuo pipefail" <<'REMOTE'
          cd '${{ vars.VM_APP_PATH }}'
          sudo -n docker --version
          sudo -n docker compose version

          APP_IMAGE_TAG='${{ github.event_name == 'workflow_dispatch' && 'latest' || format('sha-{0}', github.event.workflow_run.head_sha) }}'
          touch .env
          grep -Ev '^(APP_IMAGE_TAG|APP_PASSWORD|APP_BUILD_VERSION|APP_BUILD_TIME)=' .env > .env.tmp || true
          printf 'APP_IMAGE_TAG=%s\n' "$APP_IMAGE_TAG" >> .env.tmp
          printf 'APP_PASSWORD=%s\n' "$(printf '%s' "$APP_PASSWORD_B64" | base64 -d)" >> .env.tmp
          mv .env.tmp .env

          sudo -n docker compose pull

          APP_BUILD_VERSION=$(sudo -n docker image inspect docker.io/henryhhl18/family-budget-app:$APP_IMAGE_TAG --format '{{index .RepoDigests 0}}' | sed 's|^docker.io/henryhhl18/family-budget-app@||')
          APP_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          grep -Ev '^(APP_BUILD_VERSION|APP_BUILD_TIME)=' .env > .env.tmp || true
          mv .env.tmp .env
          printf 'APP_BUILD_VERSION=%s\nAPP_BUILD_TIME=%s\n' "$APP_BUILD_VERSION" "$APP_BUILD_TIME" >> .env

          touch budget-store.json
          mkdir -p workspace-stores

          sudo -n docker compose -p family-budget down
          sudo -n docker compose -p family-budget up -d
          REMOTE
