name: Deploy To VM

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          ssh -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" \
            "set -euxo pipefail && \
            cd '${{ vars.VM_APP_PATH }}' && \
            sudo -n docker --version && \
            sudo -n docker compose version && \
            sudo -n docker compose pull && \
            APP_BUILD_VERSION=\$(sudo -n docker image inspect docker.io/henryhhl18/family-budget-app:latest --format '{{index .RepoDigests 0}}' | sed 's|^docker.io/henryhhl18/family-budget-app@||') && \
            APP_BUILD_TIME=\$(date -u +%Y-%m-%dT%H:%M:%SZ) && \
            touch .env && \
            grep -v '^APP_BUILD_VERSION=' .env | grep -v '^APP_BUILD_TIME=' > .env.tmp || true && \
            mv .env.tmp .env && \
            printf 'APP_BUILD_VERSION=%s\nAPP_BUILD_TIME=%s\n' \"\$APP_BUILD_VERSION\" \"\$APP_BUILD_TIME\" >> .env && \
            sudo -n docker compose -p family-budget down && \
            sudo -n docker compose -p family-budget up -d"
