name: Deploy To VM

on:
  workflow_run:
    workflows: ["Docker Image CI"]
    types: [completed]
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VM_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync source code to VM
        run: |
          ssh -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" \
            "mkdir -p '${{ vars.VM_APP_PATH }}'"
          rsync -az --delete --exclude='.git' --exclude='infra' --exclude='node_modules' \
            -e "ssh -o BatchMode=yes" \
            ./ "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}:${{ vars.VM_APP_PATH }}"

      - name: Deploy with Docker Compose (build from metal)
        run: |
          ssh -o BatchMode=yes "${{ vars.VM_SSH_USER }}@${{ vars.VM_SSH_HOST }}" 'bash -seuo pipefail' <<'REMOTE'
          cd '${{ vars.VM_APP_PATH }}'

          # ── SSL certs from secrets ──
          mkdir -p certs
          cat > certs/server.crt <<'CERTEOF'
          ${{ secrets.SSL_CERT }}
          CERTEOF
          cat > certs/server.key <<'KEYEOF'
          ${{ secrets.SSL_KEY }}
          KEYEOF
          chmod 644 certs/server.crt
          chmod 600 certs/server.key

          # ── .env file ──
          cat > .env <<'ENVEOF'
          APP_PASSWORD=${{ secrets.APP_PASSWORD }}
          APP_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ENVEOF

          # ── Build and run ──
          sudo -n docker compose -f deploy/docker-compose.yml -p family-budget down
          sudo -n docker compose -f deploy/docker-compose.yml -p family-budget build --pull
          sudo -n docker compose -f deploy/docker-compose.yml -p family-budget up -d
          REMOTE
