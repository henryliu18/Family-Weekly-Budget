services:
  budget-app:
    # build: .
    image: docker.io/henryhhl18/family-budget-app:latest
    container_name: family-budget-app
    ports:
      - "80:5173"
      - "443:5443"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      HTTPS_PORT: 5443
      APP_PASSWORD: ${APP_PASSWORD:-}
      APP_BUILD_VERSION: ${APP_BUILD_VERSION:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/app/certs/server.crt}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/app/certs/server.key}
    volumes:
      - ./budget-store.json:/app/budget-store.json
      - ./certs:/app/certs:ro
    restart: unless-stopped
