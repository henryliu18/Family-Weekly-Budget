services:
  budget-app-e2e:
    image: docker.io/henryhhl18/family-budget-app:${APP_IMAGE_TAG:-latest}
    container_name: family-budget-e2e
    ports:
      - "127.0.0.1:18080:5173"
      - "127.0.0.1:18443:5443"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      HTTPS_PORT: 5443
      REDIRECT_HTTP_TO_HTTPS: "true"
      APP_PASSWORD: ${APP_PASSWORD}
      DEFAULT_ACCOUNT_ID: ${DEFAULT_ACCOUNT_ID:-e2e-owner}
      DEFAULT_ACCOUNT_DISPLAY_NAME: ${DEFAULT_ACCOUNT_DISPLAY_NAME:-E2E Owner}
      DEFAULT_ACCOUNT_EMAIL: ${DEFAULT_ACCOUNT_EMAIL:-owner@example.test}
      DEFAULT_AUTH_PROVIDER: ${DEFAULT_AUTH_PROVIDER:-password}
      DEFAULT_AUTH_SUBJECT: ${DEFAULT_AUTH_SUBJECT:-e2e-owner-subject}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-e2e-default}
      WORKSPACE_STORE_ROOT: ${WORKSPACE_STORE_ROOT:-/app/workspace-stores}
      WORKSPACE_REGISTRY_SEED_IDS: ${WORKSPACE_REGISTRY_SEED_IDS:-e2e-session-alpha,e2e-session-bravo}
      WORKSPACE_REGISTRY_UNOWNED_SEED_IDS: ${WORKSPACE_REGISTRY_UNOWNED_SEED_IDS:-e2e-unowned-workspace}
      APP_BUILD_VERSION: ${APP_BUILD_VERSION:-e2e}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-/app/certs/server.crt}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/app/certs/server.key}
    volumes:
      - ./budget-store.json:/app/budget-store.json
      - ./workspace-stores:/app/workspace-stores
      - ./certs:/app/certs:ro
    restart: unless-stopped
