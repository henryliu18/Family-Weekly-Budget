services:
  budget-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: family-budget-app
    ports:
      - "5173:5173"
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      REDIRECT_HTTP_TO_HTTPS: "false"
      APP_PASSWORD: ${APP_PASSWORD:-}
      APP_BUILD_VERSION: ${APP_BUILD_VERSION:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      WORKSPACE_STORE_ROOT: ${WORKSPACE_STORE_ROOT:-/app/workspace-stores}
    volumes:
      - ../budget-store.json:/app/budget-store.json
      - ../workspace-stores:/app/workspace-stores
    restart: unless-stopped
